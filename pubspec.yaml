name: slock_app
description: Slock Flutter client
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  dio: ^5.9.0
  file_picker: ^8.0.0
  drift: ^2.17.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.2.0
  path: ^1.9.0
  path_provider: ^2.1.3
  sentry_flutter: ^8.13.0
  sqlite3_flutter_libs: ^0.5.24
  socket_io_client: ^3.1.1
  url_launcher: ^6.3.1

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.17.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  url_launcher_android: 6.3.14

hooks:
  user_defines:
    sqlite3:
      source: process

flutter:
  uses-material-design: true
