name: slock_app
description: Slock Flutter client
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  app_links: ^6.3.3
  cached_network_image: ^3.4.1
  characters: ^1.4.0
  connectivity_plus: ^6.1.4
  dio: ^5.9.0
  emoji_picker_flutter: ^4.4.0
  file_picker: ^8.0.0
  drift: ^2.17.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  flutter_secure_storage: ^9.2.4
  go_router: ^14.2.0
  html: ^0.15.0
  intl: any
  local_auth: ^2.3.0
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  just_audio: ^0.9.43
  path: ^1.9.0
  path_provider: ^2.1.3
  record: ^5.2.0
  sentry_flutter: ^8.13.0
  share_plus: ^10.1.4
  shared_preferences: ^2.3.0
  sqlite3_flutter_libs: ^0.5.24
  socket_io_client: ^3.1.1
  url_launcher: ^6.3.1
  visibility_detector: ^0.4.0+2
  flutter_markdown: ^0.7.7+1
  flutter_svg: ^2.0.17
  flutter_web_auth_2: ^4.0.0
  markdown: ^7.3.1
  flutter_pdfview: ^1.4.4
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  build_runner: ^2.4.9
  drift_dev: ^2.17.0
  fake_async: ^1.3.0
  flutter_launcher_icons: ^0.14.3
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  glados: ^1.1.7

dependency_overrides:
  # Pinned to fix url_launcher_android crash on API 33+ when launching intents.
  # Remove after url_launcher ^6.3.15 is released with the fix.
  url_launcher_android: 6.3.14
  # Pinned to fix record_linux build failure on Ubuntu 22.04 CI runners.
  # Remove after record ^5.3.0 bundles updated Linux support.
  record_linux: 1.3.0

hooks:
  user_defines:
    sqlite3:
      source: process

flutter:
  generate: true
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/slock-icon-512.png"
  adaptive_icon_background: "#FFD440"
  adaptive_icon_foreground: "assets/slock-icon-512.png"
