name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-project:
    runs-on: ubuntu-latest
    outputs:
      has_flutter_project: ${{ steps.detect.outputs.has_flutter_project }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        shell: bash
        run: |
          if [[ -f pubspec.yaml ]]; then
            echo "has_flutter_project=true" >> "$GITHUB_OUTPUT"
            echo "Flutter project detected at repo root."
          else
            echo "has_flutter_project=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only repo state detected; CI lanes will stay green until app skeleton lands."
          fi

  docs-only-bootstrap-guard:
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_flutter_project != 'true'
    steps:
      - run: echo "Skipping Flutter CI lanes because pubspec.yaml is not present yet."

  verify:
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_flutter_project == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Format check
        run: make format

      - name: Analyze
        run: make analyze

      - name: Unit and widget tests
        run: make ci-test-all

  smoke-build:
    runs-on: ubuntu-latest
    needs: [detect-project, verify]
    if: needs.detect-project.outputs.has_flutter_project == 'true'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Smoke build
        run: make ci-build-smoke
