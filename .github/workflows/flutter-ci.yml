name: Flutter CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-project:
    runs-on: ubuntu-latest
    outputs:
      has_flutter_project: ${{ steps.detect.outputs.has_flutter_project }}
      has_android_scaffold: ${{ steps.detect.outputs.has_android_scaffold }}
      has_ios_scaffold: ${{ steps.detect.outputs.has_ios_scaffold }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: detect
        shell: bash
        run: |
          if [[ -f pubspec.yaml ]]; then
            echo "has_flutter_project=true" >> "$GITHUB_OUTPUT"
            echo "Flutter project detected at repo root."
          else
            echo "has_flutter_project=false" >> "$GITHUB_OUTPUT"
            echo "has_android_scaffold=false" >> "$GITHUB_OUTPUT"
            echo "has_ios_scaffold=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only repo state detected; CI lanes will stay green until app skeleton lands."
            exit 0
          fi

          if [[ -d android ]] \
            && [[ -f android/app/build.gradle || -f android/app/build.gradle.kts ]] \
            && [[ -f android/settings.gradle || -f android/settings.gradle.kts ]]; then
            echo "has_android_scaffold=true" >> "$GITHUB_OUTPUT"
            echo "Android scaffold detected; smoke-build lane is enabled."
          else
            echo "has_android_scaffold=false" >> "$GITHUB_OUTPUT"
            echo "Flutter project detected without Android scaffold; verify will run and smoke-build will stay green until android/ lands."
          fi

          if [[ -d ios ]] && [[ -f ios/Runner.xcodeproj/project.pbxproj ]]; then
            echo "has_ios_scaffold=true" >> "$GITHUB_OUTPUT"
            echo "iOS scaffold detected; ios-smoke-build lane is enabled."
          else
            echo "has_ios_scaffold=false" >> "$GITHUB_OUTPUT"
            echo "iOS scaffold not present; ios-smoke-build lane will stay green until ios/ lands."
          fi

  docs-only-bootstrap-guard:
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_flutter_project != 'true'
    steps:
      - run: echo "Skipping Flutter CI lanes because pubspec.yaml is not present yet."

  smoke-build-platform-guard:
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_flutter_project == 'true' && needs.detect-project.outputs.has_android_scaffold != 'true'
    steps:
      - run: echo "Skipping smoke-build because Android platform scaffold is not present yet. verify remains enabled for format/analyze/test."

  verify:
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_flutter_project == 'true'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Format check
        run: make format

      - name: Analyze
        run: make analyze

      - name: Unit and widget tests
        run: make ci-test-all

      - name: Core tests (CT)
        if: ${{ always() }}
        run: make ci-test-core

      - name: Regression tests (RT)
        if: ${{ always() }}
        run: make ci-test-regression

  smoke-build:
    runs-on: ubuntu-latest
    needs: [detect-project, verify]
    if: needs.detect-project.outputs.has_flutter_project == 'true' && needs.detect-project.outputs.has_android_scaffold == 'true'
    timeout-minutes: 30
    env:
      SLOCK_API_BASE_URL: ${{ vars.SLOCK_API_BASE_URL || secrets.SLOCK_API_BASE_URL }}
      SLOCK_REALTIME_URL: ${{ vars.SLOCK_REALTIME_URL || secrets.SLOCK_REALTIME_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@0b6dd653ba04f4f93bf581ec31e66cbd7dcb644d # v4
        with:
          cache-read-only: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Compute build number
        run: echo "BUILD_NUMBER=$(( ${{ github.run_number }} * 10 + ${{ github.run_attempt }} ))" >> "$GITHUB_ENV"

      - name: Set up release signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "No signing secrets configured — release build will use debug signing"
            exit 0
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/slock-release.jks
          printf 'storeFile=slock-release.jks\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
            "$ANDROID_STORE_PASSWORD" \
            "$ANDROID_KEY_ALIAS" \
            "$ANDROID_KEY_PASSWORD" \
            > android/key.properties

      - name: Smoke build
        run: make ci-build-smoke

      - name: Report APK size
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [[ -f "$APK_PATH" ]]; then
            SIZE_BYTES=$(stat -c%s "$APK_PATH")
            SIZE_MB=$(echo "scale=1; $SIZE_BYTES / 1048576" | bc)
            echo "### APK Size: ${SIZE_MB}MB" >> "$GITHUB_STEP_SUMMARY"
            if (( SIZE_BYTES > 125829120 )); then
              echo "⚠️ APK exceeds 120MB budget!" >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Upload APK artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 14

      - name: Publish to Pgyer
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        continue-on-error: true
        run: |
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          if [[ ! -f "$APK_PATH" ]]; then
            echo "APK not found at $APK_PATH"
            exit 1
          fi
          RESPONSE=$(curl -s --max-time 600 --retry 2 --retry-delay 30 -X POST \
            "https://api.pgyer.com/apiv2/app/upload" \
            -F "_api_key=${{ secrets.PGYER_API_KEY }}" \
            -F "file=@${APK_PATH}" \
            -F "buildUpdateDescription=Flutter main@$(git rev-parse --short HEAD)")
          CODE=$(echo "$RESPONSE" | jq -r '.code')
          if [[ "$CODE" == "0" ]]; then
            echo "Pgyer upload success"
            echo "$RESPONSE" | jq '{buildVersion: .data.buildVersion, buildBuildVersion: .data.buildBuildVersion, buildShortcutUrl: .data.buildShortcutUrl}'
          else
            echo "Pgyer upload failed: $RESPONSE"
            exit 1
          fi

  ios-smoke-build-platform-guard:
    runs-on: ubuntu-latest
    needs: detect-project
    if: needs.detect-project.outputs.has_flutter_project == 'true' && needs.detect-project.outputs.has_ios_scaffold != 'true'
    steps:
      - run: echo "Skipping ios-smoke-build because iOS platform scaffold is not present yet. verify remains enabled for format/analyze/test."

  ios-smoke-build:
    runs-on: macos-latest
    needs: [detect-project, verify]
    if: needs.detect-project.outputs.has_flutter_project == 'true' && needs.detect-project.outputs.has_ios_scaffold == 'true'
    timeout-minutes: 30
    env:
      SLOCK_API_BASE_URL: ${{ vars.SLOCK_API_BASE_URL || secrets.SLOCK_API_BASE_URL }}
      SLOCK_REALTIME_URL: ${{ vars.SLOCK_REALTIME_URL || secrets.SLOCK_REALTIME_URL }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2
        with:
          flutter-version: '3.41.7'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: iOS smoke build
        run: make ci-build-ios-smoke
