org.gradle.jvmargs=-Xmx1536m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# Downgrade JVM-target mismatch in third-party plugins from error to warning.
# Plugins like receive_sharing_intent (Java 1.8 + Kotlin 17) and
# flutter_image_compress_common (Java 11 + Kotlin 17) declare mismatched
# targets that we cannot fix from the root build script. The mismatch is
# harmless on Android — DEX compilation normalises bytecode versions.
kotlin.jvm.target.validation.mode=warning
